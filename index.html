<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Fruit Roll — Rubik tetra</title>
  <style>
    :root {
      --bg: #070a10;
      --panel: rgba(12, 16, 26, 0.72);
      --panel-border: rgba(255,255,255,0.12);
      --text: #eef5ff;
      --muted: #9aa8bb;
      --green: #49f0b4;
    }
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at 50% 25%, #17233a 0%, var(--bg) 48%, #02030a 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
    }
    #app { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; }
    .hud {
      position: fixed;
      top: max(14px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      width: min(760px, calc(100vw - 28px));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--panel-border);
      background: var(--panel);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.35);
      z-index: 5;
    }
    .title { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .title strong { font-size: 15px; letter-spacing: 0.02em; white-space: nowrap; }
    .title span { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stats { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .pill { padding: 7px 9px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 999px; font-size: 12px; color: var(--muted); white-space: nowrap; }
    .pill b { color: var(--text); }
    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 8px 12px;
      color: #06110e;
      background: linear-gradient(135deg, #40e7b1, #a7ffe9);
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(73,240,180,0.18);
    }
    button:active { transform: translateY(1px); }
    .hint {
      position: fixed;
      bottom: max(14px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      width: min(760px, calc(100vw - 28px));
      padding: 10px 12px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(8, 12, 20, 0.56);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      z-index: 5;
      pointer-events: none;
    }
    @media (max-width: 620px) {
      .hud { align-items: flex-start; }
      .stats { gap: 6px; }
      .pill { padding: 6px 8px; font-size: 11px; }
      .title strong { font-size: 14px; }
      .title span { display: none; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div class="hud">
    <div class="title">
      <strong>Fruit Roll — modo Rubik</strong>
      <span>Empieza resuelto. Tap en tetraedro = seleccionar · tap en cara vacía vecina = rodar</span>
    </div>
    <div class="stats">
      <div class="pill">Modo: <b id="modeLabel">Rubik</b></div>
      <div class="pill">Sel/Puntos: <b id="selectedPiece">—</b></div>
      <div class="pill">Movs: <b id="moves">0</b></div>
      <button id="modeBtn">Cambiar modo</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>

  <div class="hint">
    Solo rodadura: no hay giro manual. Con cuatro tetraedros y cuatro huecos, cada camino reorienta la pieza como en un Rubik.
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { TrackballControls } from 'three/addons/controls/TrackballControls.js';

    const app = document.getElementById('app');
    const modeLabelEl = document.getElementById('modeLabel');
    const selectedPieceEl = document.getElementById('selectedPiece');
    const movesEl = document.getElementById('moves');
    const modeBtn = document.getElementById('modeBtn');
    const resetBtn = document.getElementById('resetBtn');

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x070a10, 7, 15);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(2.7, 1.95, 3.15);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const controls = new TrackballControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.rotateSpeed = 3.0;
    controls.zoomSpeed = 1.1;
    controls.panSpeed = 0;
    controls.noPan = true;
    controls.minDistance = 1.85;
    controls.maxDistance = 5.8;
    controls.dynamicDampingFactor = 0.08;

    scene.add(new THREE.HemisphereLight(0x99bbff, 0x111018, 1.7));
    const keyLight = new THREE.DirectionalLight(0xffffff, 2.2);
    keyLight.position.set(4, 5, 4);
    scene.add(keyLight);
    const rimLight = new THREE.PointLight(0x49f0b4, 4.5, 10);
    rimLight.position.set(-3, 2, 3);
    scene.add(rimLight);

    const boardGroup = new THREE.Group();
    const piecesGroup = new THREE.Group();
    scene.add(boardGroup);
    scene.add(piecesGroup);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    const OCTA_R = 0.74;
    const OCTA_EDGE = OCTA_R * Math.sqrt(2);
    const TETRA_CIRCUMRADIUS = OCTA_EDGE / Math.sqrt(8 / 3);
    const SURFACE_GAP = 0.001;
    const FACE_CUT = 0.105;

    const RUBIK_COLORS = [
      { name: 'azul', color: 0x2f5dff },
      { name: 'verde', color: 0x3be48b },
      { name: 'rojo', color: 0xff4d5a },
      { name: 'amarillo', color: 0xffd84d }
    ];

    const octaVertices = [
      new THREE.Vector3( OCTA_R, 0, 0),
      new THREE.Vector3(-OCTA_R, 0, 0),
      new THREE.Vector3(0,  OCTA_R, 0),
      new THREE.Vector3(0, -OCTA_R, 0),
      new THREE.Vector3(0, 0,  OCTA_R),
      new THREE.Vector3(0, 0, -OCTA_R)
    ];

    const octaFaceVertexIndices = [
      [0, 2, 4], [4, 2, 1], [1, 2, 5], [5, 2, 0],
      [4, 3, 0], [1, 3, 4], [5, 3, 1], [0, 3, 5]
    ];

    // Caras alternas. Con tetraedros sobre estas 4 caras, la figura empieza como un tetraedro grande resuelto.
    const SOLVED_FACE_INDICES = [0, 2, 5, 7];
    // Estas 4 caras son las caras visibles del octaedro central cuando la figura está resuelta.
    // Sus normales definen los 4 colores de las “grandes caras” del tetraedro final.
    const COLOR_FACE_INDICES = [1, 3, 4, 6];

    const rawTetraVertices = [
      new THREE.Vector3( 1,  1,  1),
      new THREE.Vector3(-1, -1,  1),
      new THREE.Vector3(-1,  1, -1),
      new THREE.Vector3( 1, -1, -1)
    ].map(v => v.normalize().multiplyScalar(TETRA_CIRCUMRADIUS));

    const tetraFaceVertexIndices = [
      [0, 2, 1],
      [0, 1, 3],
      [0, 3, 2],
      [1, 2, 3]
    ];

    const tetraFaces = [];
    const octaFaces = [];
    const pieces = [];
    const occupiedFaceToPiece = new Map();
    let targetMarker = null;

    let gameMode = 'rubik'; // 'rubik' o 't'
    let selectedPieceId = null;
    let moves = 0;
    let score = 0;
    let isAnimating = false;
    let targetFaceIndex = 1;
    let targetOrientation = 0;

    function faceNormal(a, b, c) {
      return new THREE.Vector3().subVectors(b, a).cross(new THREE.Vector3().subVectors(c, a)).normalize();
    }

    function faceCenter(a, b, c) {
      return new THREE.Vector3().addVectors(a, b).add(c).multiplyScalar(1 / 3);
    }

    function getTruncatedFacePoints(a, b, c, cut = FACE_CUT) {
      const ab1 = a.clone().lerp(b, cut);
      const ab2 = b.clone().lerp(a, cut);
      const bc1 = b.clone().lerp(c, cut);
      const bc2 = c.clone().lerp(b, cut);
      const ca1 = c.clone().lerp(a, cut);
      const ca2 = a.clone().lerp(c, cut);
      return [ab1, ab2, bc1, bc2, ca1, ca2];
    }

    function makeTriangleMesh(a, b, c, material) {
      const pts = getTruncatedFacePoints(a, b, c);
      const center = faceCenter(a, b, c);
      const vertices = [];
      for (let i = 0; i < pts.length; i++) {
        const p1 = pts[i];
        const p2 = pts[(i + 1) % pts.length];
        vertices.push(center.x, center.y, center.z, p1.x, p1.y, p1.z, p2.x, p2.y, p2.z);
      }
      const geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vertices), 3));
      geom.computeVertexNormals();
      return new THREE.Mesh(geom, material);
    }

    function makeTruncatedEdgeLine(a, b, c, color = 0xffffff, opacity = 0.22) {
      const points = getTruncatedFacePoints(a, b, c);
      const geom = new THREE.BufferGeometry().setFromPoints(points);
      const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity });
      return new THREE.LineLoop(geom, mat);
    }

    function makeTextPlane(text, options = {}) {
      const { fontSize = 150, color = '#ffffff', stroke = 'rgba(0,0,0,0.82)', padding = 18, scale = 0.00235 } = options;
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      ctx.font = `950 ${fontSize}px system-ui, -apple-system, Segoe UI, sans-serif`;
      const metrics = ctx.measureText(text);
      canvas.width = Math.ceil(metrics.width + padding * 2);
      canvas.height = Math.ceil(fontSize + padding * 2);
      ctx.font = `950 ${fontSize}px system-ui, -apple-system, Segoe UI, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.lineWidth = Math.max(12, fontSize * 0.13);
      ctx.strokeStyle = stroke;
      ctx.strokeText(text, canvas.width / 2, canvas.height / 2 + 3);
      ctx.fillStyle = color;
      ctx.fillText(text, canvas.width / 2, canvas.height / 2 + 3);
      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
      const material = new THREE.MeshBasicMaterial({
        map: texture,
        transparent: true,
        depthWrite: false,
        polygonOffset: true,
        polygonOffsetFactor: -4,
        side: THREE.DoubleSide
      });
      const geometry = new THREE.PlaneGeometry(canvas.width * scale, canvas.height * scale);
      return new THREE.Mesh(geometry, material);
    }

    function attachPlaneToTriangle(plane, a, b, c, normal, orientation = 0, offset = 0.020) {
      const center = faceCenter(a, b, c);
      const angle = orientation * (Math.PI * 2 / 3);
      const baseX = new THREE.Vector3().subVectors(b, a).normalize();
      const xAxis = baseX.clone().applyAxisAngle(normal, angle).normalize();
      const yAxis = new THREE.Vector3().crossVectors(normal, xAxis).normalize();
      const basis = new THREE.Matrix4().makeBasis(xAxis, yAxis, normal);
      plane.quaternion.setFromRotationMatrix(basis);
      plane.position.copy(center).addScaledVector(normal, offset);
    }

    function makeFlatCap(points, material) {
      const center = points.reduce((acc, p) => acc.add(p), new THREE.Vector3()).multiplyScalar(1 / points.length);
      const vertices = [];
      for (let i = 0; i < points.length; i++) {
        const p1 = points[i];
        const p2 = points[(i + 1) % points.length];
        vertices.push(center.x, center.y, center.z, p1.x, p1.y, p1.z, p2.x, p2.y, p2.z);
      }
      const geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vertices), 3));
      geom.computeVertexNormals();
      return new THREE.Mesh(geom, material);
    }

    function sortCapPointsAroundVertex(vertex, points) {
      const normal = vertex.clone().normalize();
      let ref = new THREE.Vector3(1, 0, 0);
      if (Math.abs(ref.dot(normal)) > 0.9) ref = new THREE.Vector3(0, 1, 0);
      const u = ref.sub(normal.clone().multiplyScalar(ref.dot(normal))).normalize();
      const v = new THREE.Vector3().crossVectors(normal, u).normalize();
      return points.sort((a, b) => {
        const da = a.clone().sub(vertex);
        const db = b.clone().sub(vertex);
        return Math.atan2(da.dot(v), da.dot(u)) - Math.atan2(db.dot(v), db.dot(u));
      });
    }

    function addFlatTruncationCaps(group, vertices, faceIndexList, color, cut = FACE_CUT, userData = {}) {
      const mat = new THREE.MeshStandardMaterial({
        color,
        roughness: 0.52,
        metalness: 0.04,
        side: THREE.DoubleSide,
        transparent: false,
        opacity: 1
      });
      const adjacency = new Map();
      vertices.forEach((_, i) => adjacency.set(i, new Set()));
      for (const face of faceIndexList) {
        const pairs = [[face[0], face[1]], [face[1], face[2]], [face[2], face[0]]];
        for (const [i, j] of pairs) {
          adjacency.get(i).add(j);
          adjacency.get(j).add(i);
        }
      }
      for (const [i, adj] of adjacency.entries()) {
        const vertex = vertices[i];
        const capPoints = [...adj].map(j => vertex.clone().lerp(vertices[j], cut));
        const sorted = sortCapPointsAroundVertex(vertex, capPoints);
        const cap = makeFlatCap(sorted, mat);
        cap.userData = { ...userData };
        group.add(cap);
      }
    }

    function buildTetraFaceData() {
      tetraFaces.length = 0;
      tetraFaceVertexIndices.forEach((rawIds, index) => {
        const ids = [...rawIds];
        let a = rawTetraVertices[ids[0]].clone();
        let b = rawTetraVertices[ids[1]].clone();
        let c = rawTetraVertices[ids[2]].clone();
        let normal = faceNormal(a, b, c);
        let center = faceCenter(a, b, c);
        if (normal.dot(center) < 0) {
          [ids[1], ids[2]] = [ids[2], ids[1]];
          a = rawTetraVertices[ids[0]].clone();
          b = rawTetraVertices[ids[1]].clone();
          c = rawTetraVertices[ids[2]].clone();
          normal = faceNormal(a, b, c);
          center = faceCenter(a, b, c);
        }
        tetraFaces.push({ index, ids, vertices: [a, b, c], center, normal });
      });
    }

    buildTetraFaceData();

    function colorIndexForDirection(normal) {
      // Color por gran cara del tetraedro final.
      // Usamos valor absoluto para que cada par de caras opuestas del octaedro tenga el mismo color.
      // Así el octaedro queda equilibrado: 2 azules, 2 verdes, 2 rojas y 2 amarillas.
      let best = 0;
      let bestDot = -Infinity;
      for (let i = 0; i < COLOR_FACE_INDICES.length; i++) {
        const d = Math.abs(normal.dot(octaFaces[COLOR_FACE_INDICES[i]].normal));
        if (d > bestDot) { bestDot = d; best = i; }
      }
      return best;
    }

    function buildOctahedronBoard() {
      boardGroup.clear();
      octaFaces.length = 0;

      octaFaceVertexIndices.forEach((rawIds, index) => {
        const ids = [...rawIds];
        let a = octaVertices[ids[0]].clone();
        let b = octaVertices[ids[1]].clone();
        let c = octaVertices[ids[2]].clone();
        let normal = faceNormal(a, b, c);
        let center = faceCenter(a, b, c);

        if (normal.dot(center) < 0) {
          [ids[1], ids[2]] = [ids[2], ids[1]];
          a = octaVertices[ids[0]].clone();
          b = octaVertices[ids[1]].clone();
          c = octaVertices[ids[2]].clone();
          normal = faceNormal(a, b, c);
          center = faceCenter(a, b, c);
        }

        octaFaces.push({ index, ids, vertices: [a, b, c], center, normal, mesh: null, material: null, neighbors: [] });
      });

      // Necesitamos las normales de las caras resueltas antes de colorear.
      octaFaces.forEach((face, index) => {
        const colorIdx = colorIndexForDirection(face.normal);
        const material = new THREE.MeshStandardMaterial({
          color: RUBIK_COLORS[colorIdx].color,
          roughness: 0.58,
          metalness: 0.06,
          side: THREE.DoubleSide,
          transparent: false,
          opacity: 1
        });
        const [a, b, c] = face.vertices;
        const mesh = makeTriangleMesh(a, b, c, material);
        mesh.userData.type = 'octaFace';
        mesh.userData.faceIndex = index;
        face.mesh = mesh;
        face.material = material;
        face.colorIndex = colorIdx;
        boardGroup.add(mesh);
        boardGroup.add(makeTruncatedEdgeLine(a, b, c, 0xffffff, 0.16));
      });

      addFlatTruncationCaps(boardGroup, octaVertices, octaFaceVertexIndices, 0x1f2b3f);

      targetMarker = makeTextPlane('T', { color: '#ffe66d', stroke: 'rgba(0,0,0,0.82)', fontSize: 150, scale: 0.00235 });
      targetMarker.visible = false;
      boardGroup.add(targetMarker);
    }

    function sharedVertices(faceA, faceB) {
      return faceA.ids.filter(id => faceB.ids.includes(id));
    }

    function computeNeighbors() {
      octaFaces.forEach(face => face.neighbors = []);
      for (let i = 0; i < octaFaces.length; i++) {
        for (let j = i + 1; j < octaFaces.length; j++) {
          const shared = sharedVertices(octaFaces[i], octaFaces[j]);
          if (shared.length === 2) {
            const edgePoints = shared.map(id => octaVertices[id].clone());
            octaFaces[i].neighbors.push({ faceIndex: j, edgeVertexIds: shared, edgePoints });
            octaFaces[j].neighbors.push({ faceIndex: i, edgeVertexIds: shared, edgePoints });
          }
        }
      }
    }

    buildOctahedronBoard();
    computeNeighbors();

    function basisFromOrderedTriangle(points, desiredNormal) {
      const p0 = points[0].clone();
      const p1 = points[1].clone();
      const p2 = points[2].clone();
      const normal = faceNormal(p0, p1, p2);
      const x = new THREE.Vector3().subVectors(p1, p0).normalize();
      const y = new THREE.Vector3().crossVectors(normal, x).normalize();
      const center = faceCenter(p0, p1, p2);
      const matrix = new THREE.Matrix4().makeBasis(x, y, normal);
      return { center, normal, matrix };
    }

    function poseForMapping(octaFaceIndex, tetraBottomFaceIndex, map) {
      const octaFace = octaFaces[octaFaceIndex];
      const tetraFace = tetraFaces[tetraBottomFaceIndex];
      const sourceIds = tetraFace.ids;
      const sourcePoints = sourceIds.map(id => rawTetraVertices[id].clone());
      const targetPoints = sourceIds.map(tid => {
        const oid = map.get(tid);
        return octaVertices[oid].clone().addScaledVector(octaFace.normal, SURFACE_GAP);
      });
      const source = basisFromOrderedTriangle(sourcePoints, tetraFace.normal);
      const target = basisFromOrderedTriangle(targetPoints, octaFace.normal.clone().negate());
      const invSourceRot = source.matrix.clone().invert();
      const rotMatrix = target.matrix.clone().multiply(invSourceRot);
      const quat = new THREE.Quaternion().setFromRotationMatrix(rotMatrix);
      const sourceCenterRotated = source.center.clone().applyQuaternion(quat);
      const pos = target.center.clone().sub(sourceCenterRotated);
      return { pos, quat };
    }

    function makeContactMap(octaFaceIndex, tetraBottomFaceIndex, orientation = 0) {
      const octaFace = octaFaces[octaFaceIndex];
      const tetraFace = tetraFaces[tetraBottomFaceIndex];
      const tids = tetraFace.ids;
      const oids = octaFace.ids;
      const candidates = [
        [oids[0], oids[1], oids[2]], [oids[0], oids[2], oids[1]],
        [oids[1], oids[2], oids[0]], [oids[1], oids[0], oids[2]],
        [oids[2], oids[0], oids[1]], [oids[2], oids[1], oids[0]]
      ];
      let best = candidates[0];
      let bestDot = -Infinity;
      for (const cand of candidates) {
        const pts = cand.map(id => octaVertices[id].clone().addScaledVector(octaFace.normal, SURFACE_GAP));
        const n = faceNormal(pts[0], pts[1], pts[2]);
        const d = n.dot(octaFace.normal.clone().negate());
        if (d > bestDot) { bestDot = d; best = cand; }
      }
      const spin = ((orientation % 3) + 3) % 3;
      const spun = best.slice(spin).concat(best.slice(0, spin));
      const map = new Map();
      tids.forEach((tid, i) => map.set(tid, spun[i]));
      return map;
    }

    function applyPiecePose(piece) {
      const pose = poseForMapping(piece.octaFaceIndex, piece.bottomFaceIndex, piece.contactMap);
      piece.group.position.copy(pose.pos);
      piece.group.quaternion.copy(pose.quat);
      piece.group.updateMatrixWorld(true);
      updatePieceVisibility(piece);
    }

    function getPieceFaceWorldNormal(piece, faceIndex) {
      return tetraFaces[faceIndex].normal.clone().transformDirection(piece.group.matrixWorld).normalize();
    }

    function getPieceVertexWorld(piece, vertexId) {
      return rawTetraVertices[vertexId].clone().applyMatrix4(piece.group.matrixWorld);
    }

    function updatePieceVisibility(piece, { hideBottom = true } = {}) {
      piece.faceMeshes.forEach((mesh, i) => {
        const hidden = hideBottom && i === piece.bottomFaceIndex;
        mesh.visible = !hidden;
      });
      piece.edgeLines.forEach((line, i) => {
        const hidden = hideBottom && i === piece.bottomFaceIndex;
        line.visible = !hidden;
      });
      if (piece.tMarker) {
        piece.tMarker.visible = gameMode === 't' && !(hideBottom && piece.bottomFaceIndex === 0);
      }
    }

    function makePieceFaceMaterial(color, selected = false) {
      return new THREE.MeshStandardMaterial({
        color,
        emissive: selected ? 0x1b4034 : 0x000000,
        roughness: 0.36,
        metalness: 0.08,
        side: THREE.DoubleSide,
        transparent: false,
        opacity: 1
      });
    }

    function setPieceSelected(piece, selected) {
      piece.selected = selected;
      piece.edgeLines.forEach(line => {
        line.material.color.set(selected ? 0xffffff : 0x05070b);
        line.material.opacity = selected ? 0.95 : 0.50;
      });
      piece.faceMeshes.forEach((mesh, i) => {
        const c = RUBIK_COLORS[piece.faceColorIndices[i]].color;
        mesh.material.color.set(c);
        mesh.material.emissive.set(selected ? 0x14382d : 0x000000);
      });
      updatePieceVisibility(piece);
    }

    function selectPiece(pieceId) {
      selectedPieceId = pieceId;
      pieces.forEach(p => setPieceSelected(p, p.id === pieceId));
      updateHUD();
    }

    function deselectAll() {
      selectedPieceId = null;
      pieces.forEach(p => setPieceSelected(p, false));
      updateHUD();
    }

    function createRubikPiece(id, octaFaceIndex) {
      const group = new THREE.Group();
      group.userData.type = 'pieceGroup';
      group.userData.pieceId = id;
      piecesGroup.add(group);

      const piece = {
        id,
        group,
        octaFaceIndex,
        bottomFaceIndex: 0,
        contactMap: makeContactMap(octaFaceIndex, 0, 0),
        faceMeshes: [],
        edgeLines: [],
        faceColorIndices: [0, 1, 2, 3],
        selected: false,
        solvedFaceIndex: octaFaceIndex,
        solvedContactMap: null
      };

      // Coloca provisionalmente para poder colorear las caras según su normal mundial resuelta.
      applyPiecePose(piece);

      // En la posición resuelta, cada cara del tetraedro toma el color de la gran cara
      // hacia la que mira. Esto hace que la figura empiece realmente terminada.
      tetraFaces.forEach((face, faceIndex) => {
        const worldNormal = getPieceFaceWorldNormal(piece, faceIndex);
        piece.faceColorIndices[faceIndex] = colorIndexForDirection(worldNormal);
      });

      group.clear();
      piece.faceMeshes = [];
      piece.edgeLines = [];

      tetraFaces.forEach((face, faceIndex) => {
        const material = makePieceFaceMaterial(RUBIK_COLORS[piece.faceColorIndices[faceIndex]].color);
        const [a, b, c] = face.vertices;
        const mesh = makeTriangleMesh(a, b, c, material);
        mesh.userData.type = 'pieceFace';
        mesh.userData.pieceId = id;
        mesh.userData.faceIndex = faceIndex;
        group.add(mesh);
        piece.faceMeshes.push(mesh);

        const edge = makeTruncatedEdgeLine(a, b, c, 0x05070b, 0.50);
        edge.userData.type = 'pieceEdge';
        edge.userData.pieceId = id;
        group.add(edge);
        piece.edgeLines.push(edge);
      });

      addFlatTruncationCaps(group, rawTetraVertices, tetraFaceVertexIndices, 0x1f2b3f, FACE_CUT, { type: 'pieceCap', pieceId: id });

      piece.tMarker = makeTextPlane('T', { color: '#ffffff', stroke: 'rgba(0,0,0,0.86)', fontSize: 150, scale: 0.0022 });
      const special = tetraFaces[0];
      attachPlaneToTriangle(piece.tMarker, special.vertices[0], special.vertices[1], special.vertices[2], special.normal, 0, 0.020);
      piece.tMarker.visible = gameMode === 't';
      group.add(piece.tMarker);

      applyPiecePose(piece);
      piece.solvedContactMap = new Map(piece.contactMap);
      return piece;
    }

    function transformByAxis(point, quat, pivot) {
      return point.clone().sub(pivot).applyQuaternion(quat).add(pivot);
    }

    function signedAngleAroundAxis(fromVec, toVec, axis) {
      const a = axis.clone().normalize();
      const v1 = fromVec.clone().sub(a.clone().multiplyScalar(fromVec.dot(a))).normalize();
      const v2 = toVec.clone().sub(a.clone().multiplyScalar(toVec.dot(a))).normalize();
      const cross = new THREE.Vector3().crossVectors(v1, v2);
      const sin = cross.dot(a);
      const cos = THREE.MathUtils.clamp(v1.dot(v2), -1, 1);
      return Math.atan2(sin, cos);
    }

    function octaOutsideMargin(point) {
      return Math.abs(point.x) + Math.abs(point.y) + Math.abs(point.z) - OCTA_R;
    }

    function minPieceOutsideMarginForRotation(piece, startPos, startQuat, axis, pivot, angle) {
      const q = new THREE.Quaternion().setFromAxisAngle(axis, angle);
      let minMargin = Infinity;
      for (const v of rawTetraVertices) {
        const world = v.clone().applyQuaternion(startQuat).add(startPos);
        const rotated = transformByAxis(world, q, pivot);
        minMargin = Math.min(minMargin, octaOutsideMargin(rotated));
      }
      return minMargin;
    }

    function chooseExteriorRollAngle(piece, baseAngle, startPos, startQuat, axis, pivot) {
      const candidates = [baseAngle, baseAngle + Math.PI * 2, baseAngle - Math.PI * 2];
      let bestAngle = baseAngle;
      let bestScore = -Infinity;
      for (const candidate of candidates) {
        const score = Math.min(
          minPieceOutsideMarginForRotation(piece, startPos, startQuat, axis, pivot, candidate * 0.25),
          minPieceOutsideMarginForRotation(piece, startPos, startQuat, axis, pivot, candidate * 0.50),
          minPieceOutsideMarginForRotation(piece, startPos, startQuat, axis, pivot, candidate * 0.75)
        ) - Math.abs(candidate) * 0.0001;
        if (score > bestScore) { bestScore = score; bestAngle = candidate; }
      }
      return bestAngle;
    }

    function computePieceRollState(piece, targetFaceIndex) {
      const currentFace = octaFaces[piece.octaFaceIndex];
      const neighbor = currentFace.neighbors.find(n => n.faceIndex === targetFaceIndex);
      if (!neighbor) return null;

      const currentBottom = tetraFaces[piece.bottomFaceIndex];
      const sharedOctaIds = neighbor.edgeVertexIds;
      const sharedTetraIds = currentBottom.ids.filter(tid => sharedOctaIds.includes(piece.contactMap.get(tid)));
      if (sharedTetraIds.length !== 2) return null;

      const newBottomFace = tetraFaces.find(face => face.index !== piece.bottomFaceIndex && sharedTetraIds.every(tid => face.ids.includes(tid)));
      if (!newBottomFace) return null;

      const targetFace = octaFaces[targetFaceIndex];
      const targetThirdOctaId = targetFace.ids.find(oid => !sharedOctaIds.includes(oid));
      const newThirdTetraId = newBottomFace.ids.find(tid => !sharedTetraIds.includes(tid));

      const newMap = new Map();
      sharedTetraIds.forEach(tid => newMap.set(tid, piece.contactMap.get(tid)));
      newMap.set(newThirdTetraId, targetThirdOctaId);
      return { newBottomFaceIndex: newBottomFace.index, newMap, sharedTetraIds, neighbor };
    }

    function canPieceRollTo(piece, targetFaceIndex) {
      if (occupiedFaceToPiece.has(targetFaceIndex)) return false;
      return octaFaces[piece.octaFaceIndex].neighbors.some(n => n.faceIndex === targetFaceIndex);
    }

    function rollPieceToFace(piece, targetFaceIndex) {
      if (isAnimating) return;
      if (!canPieceRollTo(piece, targetFaceIndex)) return;
      const rollState = computePieceRollState(piece, targetFaceIndex);
      if (!rollState) return;

      isAnimating = true;
      updatePieceVisibility(piece, { hideBottom: false });

      piece.group.updateMatrixWorld(true);
      const edgeWorldA = getPieceVertexWorld(piece, rollState.sharedTetraIds[0]);
      const edgeWorldB = getPieceVertexWorld(piece, rollState.sharedTetraIds[1]);
      const axis = new THREE.Vector3().subVectors(edgeWorldB, edgeWorldA).normalize();
      const pivot = edgeWorldA.clone();
      const startPos = piece.group.position.clone();
      const startQuat = piece.group.quaternion.clone();
      const newBottomNormalNow = getPieceFaceWorldNormal(piece, rollState.newBottomFaceIndex);
      const requiredBottomNormal = octaFaces[targetFaceIndex].normal.clone().negate();
      const baseAngle = signedAngleAroundAxis(newBottomNormalNow, requiredBottomNormal, axis);
      const angle = chooseExteriorRollAngle(piece, baseAngle, startPos, startQuat, axis, pivot);
      const endPose = poseForMapping(targetFaceIndex, rollState.newBottomFaceIndex, rollState.newMap);

      const duration = 720;
      const startTime = performance.now();
      const oldFaceIndex = piece.octaFaceIndex;

      function animateRoll(now) {
        const rawT = Math.min(1, (now - startTime) / duration);
        const t = easeInOutCubic(rawT);
        const q = new THREE.Quaternion().setFromAxisAngle(axis, angle * t);
        piece.group.position.copy(transformByAxis(startPos, q, pivot));
        piece.group.quaternion.copy(q.clone().multiply(startQuat));
        piece.group.updateMatrixWorld(true);

        if (rawT < 1) {
          requestAnimationFrame(animateRoll);
        } else {
          occupiedFaceToPiece.delete(oldFaceIndex);
          occupiedFaceToPiece.set(targetFaceIndex, piece.id);
          piece.octaFaceIndex = targetFaceIndex;
          piece.bottomFaceIndex = rollState.newBottomFaceIndex;
          piece.contactMap = rollState.newMap;
          piece.group.position.copy(endPose.pos);
          piece.group.quaternion.copy(endPose.quat);
          piece.group.updateMatrixWorld(true);
          updatePieceVisibility(piece);
          moves += 1;
          updateHUD();
          isAnimating = false;
          if (gameMode === 't') checkTMatch();
          else checkSolvedState();
        }
      }
      requestAnimationFrame(animateRoll);
    }

    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function updateHUD() {
      modeLabelEl.textContent = gameMode === 'rubik' ? 'Rubik' : 'T';
      selectedPieceEl.textContent = gameMode === 'rubik'
        ? (selectedPieceId == null ? '—' : `T${selectedPieceId + 1}`)
        : String(score);
      movesEl.textContent = String(moves);
    }

    function checkSolvedState() {
      const solved = pieces.every(piece => {
        if (piece.octaFaceIndex !== piece.solvedFaceIndex) return false;
        for (const [tid, oid] of piece.solvedContactMap.entries()) {
          if (piece.contactMap.get(tid) !== oid) return false;
        }
        return true;
      });
      if (solved && moves > 0) console.log('Figura resuelta');
    }

    function tangentDirectionOfPlane(plane, faceNormal) {
      scene.updateMatrixWorld(true);
      const dir = new THREE.Vector3(0, 1, 0).transformDirection(plane.matrixWorld).normalize();
      const tangent = dir.sub(faceNormal.clone().multiplyScalar(dir.dot(faceNormal)));
      if (tangent.lengthSq() < 0.000001) return new THREE.Vector3(0, 0, 0);
      return tangent.normalize();
    }

    function spawnTTarget() {
      const current = pieces[0]?.octaFaceIndex ?? 0;
      const available = octaFaces.map(f => f.index).filter(i => i !== current);
      targetFaceIndex = available[Math.floor(Math.random() * available.length)];
      targetOrientation = Math.floor(Math.random() * 3);
      const f = octaFaces[targetFaceIndex];
      attachPlaneToTriangle(targetMarker, f.vertices[0], f.vertices[1], f.vertices[2], f.normal, targetOrientation, 0.030);
      targetMarker.visible = true;
    }

    function checkTMatch() {
      if (gameMode !== 't') return;
      const piece = pieces[0];
      if (!piece) return;
      if (piece.octaFaceIndex !== targetFaceIndex) return;
      if (piece.bottomFaceIndex !== 0) return;
      const faceNormal = octaFaces[targetFaceIndex].normal.clone();
      const targetUp = tangentDirectionOfPlane(targetMarker, faceNormal);
      const tetraUp = tangentDirectionOfPlane(piece.tMarker, faceNormal);
      const alignment = Math.max(tetraUp.dot(targetUp), tetraUp.dot(targetUp.clone().negate()));
      if (alignment < 0.82) return;
      score += 1;
      spawnTTarget();
      updateHUD();
    }

    function initRubikMode() {
      gameMode = 'rubik';
      targetMarker.visible = false;
      piecesGroup.clear();
      pieces.length = 0;
      occupiedFaceToPiece.clear();
      selectedPieceId = null;
      moves = 0;
      score = 0;

      SOLVED_FACE_INDICES.forEach((faceIndex, id) => {
        const piece = createRubikPiece(id, faceIndex);
        pieces.push(piece);
        occupiedFaceToPiece.set(faceIndex, id);
      });

      selectPiece(0);
      updateHUD();
    }

    function initTMode() {
      gameMode = 't';
      piecesGroup.clear();
      pieces.length = 0;
      occupiedFaceToPiece.clear();
      selectedPieceId = null;
      moves = 0;
      score = 0;
      const piece = createRubikPiece(0, 0);
      pieces.push(piece);
      occupiedFaceToPiece.set(0, 0);
      selectPiece(0);
      spawnTTarget();
      updateHUD();
    }

    function toggleMode() {
      if (gameMode === 'rubik') initTMode();
      else initRubikMode();
    }

    let pointerStart = null;
    const TAP_MAX_DISTANCE = 8;
    const TAP_MAX_TIME = 450;

    function onPointerDown(event) {
      pointerStart = { x: event.clientX, y: event.clientY, time: performance.now() };
    }

    function findPieceInHits(hits) {
      // Solo aceptamos MESHES de piezas, no líneas de borde. Las líneas del tetraedro
      // seleccionado pueden cruzar visualmente otra pieza y robar el tap.
      const validHits = hits.filter(hit => {
        const obj = hit.object;
        if (!obj || !obj.visible) return false;
        if (!obj.isMesh) return false;
        if (obj.userData?.pieceId === undefined) return false;
        if (obj.userData?.type === 'pieceEdge') return false;
        return true;
      });

      if (!validHits.length) return null;

      // Si hay varias piezas bajo el tap, escogemos la pieza con el hit más cercano real.
      validHits.sort((a, b) => a.distance - b.distance);
      return pieces[validHits[0].object.userData.pieceId] ?? null;
    }

    function findOctaFaceInHits(hits) {
      for (const hit of hits) {
        if (hit.object?.userData?.type === 'octaFace') return hit.object.userData.faceIndex;
      }
      return null;
    }

    function onPointerUp(event) {
      if (isAnimating || !pointerStart) return;
      const dx = event.clientX - pointerStart.x;
      const dy = event.clientY - pointerStart.y;
      const dist = Math.hypot(dx, dy);
      const dt = performance.now() - pointerStart.time;
      const wasTap = dist <= TAP_MAX_DISTANCE && dt <= TAP_MAX_TIME;
      pointerStart = null;
      if (!wasTap) return;

      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);

      const pieceHits = raycaster.intersectObjects(piecesGroup.children, true);
      const faceHits = raycaster.intersectObjects(octaFaces.map(f => f.mesh), false);
      const faceIndex = findOctaFaceInHits(faceHits);

      // Tap fuera de la figura: deselecciona todo para ver la pieza limpia.
      if (gameMode === 'rubik' && pieceHits.length === 0 && faceHits.length === 0) {
        deselectAll();
        return;
      }

      // Primero intentamos mover a una cara vacía. Así, si la pieza visualmente tapa parte
      // del click, no roba el tap destinado a la cara del octaedro.
      if (faceIndex != null && !occupiedFaceToPiece.has(faceIndex)) {
        if (gameMode === 't') {
          const p = pieces[0];
          if (p && canPieceRollTo(p, faceIndex)) {
            rollPieceToFace(p, faceIndex);
            return;
          }
        } else if (selectedPieceId != null) {
          const selected = pieces[selectedPieceId];
          if (selected && canPieceRollTo(selected, faceIndex)) {
            rollPieceToFace(selected, faceIndex);
            return;
          }
        }
      }

      const hitPiece = findPieceInHits(pieceHits);
      if (hitPiece) {
        selectPiece(hitPiece.id);
        return;
      }

      if (gameMode === 'rubik' && faceIndex != null && !occupiedFaceToPiece.has(faceIndex)) {
        const candidates = pieces.filter(p => canPieceRollTo(p, faceIndex));
        if (candidates.length === 1) {
          selectPiece(candidates[0].id);
          rollPieceToFace(candidates[0], faceIndex);
        } else if (candidates.length > 1) {
          console.log('Hay varios tetraedros que pueden rodar a esa cara: selecciona primero una pieza.', candidates.map(p => p.id));
        }
      }
    }

    renderer.domElement.addEventListener('pointerdown', onPointerDown, { passive: true });
    renderer.domElement.addEventListener('pointerup', onPointerUp, { passive: true });
    modeBtn.addEventListener('click', toggleMode);
    resetBtn.addEventListener('click', () => {
      if (gameMode === 'rubik') initRubikMode();
      else initTMode();
    });

    function addAtmosphere() {
      const starGeom = new THREE.BufferGeometry();
      const positions = [];
      for (let i = 0; i < 260; i++) {
        const r = 8 + Math.random() * 10;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(THREE.MathUtils.randFloatSpread(2));
        positions.push(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
      }
      starGeom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.015, transparent: true, opacity: 0.5 });
      scene.add(new THREE.Points(starGeom, starMat));
    }

    addAtmosphere();
    initRubikMode();

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      controls.handleResize();
    }
    window.addEventListener('resize', onResize);

    function animate() {
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>

<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Fruit Roll — prototipo</title>
  <style>
    :root {
      --bg: #070a10;
      --panel: rgba(12, 16, 26, 0.72);
      --panel-border: rgba(255,255,255,0.12);
      --text: #eef5ff;
      --muted: #9aa8bb;
      --green: #49f0b4;
    }
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at 50% 25%, #17233a 0%, var(--bg) 48%, #02030a 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
    }
    #app { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; }
    .hud {
      position: fixed;
      top: max(14px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      width: min(680px, calc(100vw - 28px));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--panel-border);
      background: var(--panel);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.35);
      z-index: 5;
    }
    .title { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .title strong { font-size: 15px; letter-spacing: 0.02em; white-space: nowrap; }
    .title span { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stats { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .pill { padding: 7px 9px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 999px; font-size: 12px; color: var(--muted); white-space: nowrap; }
    .pill b { color: var(--text); }
    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 8px 12px;
      color: #06110e;
      background: linear-gradient(135deg, #40e7b1, #a7ffe9);
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(73,240,180,0.18);
    }
    button:active { transform: translateY(1px); }
    .hint {
      position: fixed;
      bottom: max(14px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      width: min(680px, calc(100vw - 28px));
      padding: 10px 12px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(8, 12, 20, 0.56);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      z-index: 5;
      pointer-events: none;
    }
    @media (max-width: 620px) {
      .hud { align-items: flex-start; }
      .stats { gap: 6px; }
      .pill { padding: 6px 8px; font-size: 11px; }
      .title strong { font-size: 14px; }
      .title span { display: none; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div class="hud">
    <div class="title">
      <strong>Fruit Roll</strong>
      <span>Arrastra para girar cámara · tap corto en cara vecina para rodar</span>
    </div>
    <div class="stats">
      <div class="pill">Puntos: <b id="score">0</b></div>
      <div class="pill">Movs: <b id="moves">0</b></div>
      <button id="resetBtn">Reset</button>
    </div>
  </div>

  <div class="hint">
    Haz coincidir la T oculta del tetraedro con la T del octaedro. No aparece objetivo bajo la cara cubierta.
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { TrackballControls } from 'three/addons/controls/TrackballControls.js';

    const app = document.getElementById('app');
    const scoreEl = document.getElementById('score');
    const movesEl = document.getElementById('moves');
    const resetBtn = document.getElementById('resetBtn');

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x070a10, 7, 15);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(2.7, 1.95, 3.15);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    // TrackballControls permite girar libremente sin el “tope” vertical de OrbitControls.
    const controls = new TrackballControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.rotateSpeed = 3.0;
    controls.zoomSpeed = 1.1;
    controls.panSpeed = 0;
    controls.noPan = true;
    controls.minDistance = 1.85;
    controls.maxDistance = 5.8;
    controls.dynamicDampingFactor = 0.08;

    scene.add(new THREE.HemisphereLight(0x99bbff, 0x111018, 1.7));
    const keyLight = new THREE.DirectionalLight(0xffffff, 2.2);
    keyLight.position.set(4, 5, 4);
    scene.add(keyLight);
    const rimLight = new THREE.PointLight(0x49f0b4, 4.5, 10);
    rimLight.position.set(-3, 2, 3);
    scene.add(rimLight);

    const boardGroup = new THREE.Group();
    const tetraGroup = new THREE.Group();
    scene.add(boardGroup);
    scene.add(tetraGroup);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    const OCTA_R = 0.74;
    const OCTA_EDGE = OCTA_R * Math.sqrt(2);
    const TETRA_CIRCUMRADIUS = OCTA_EDGE / Math.sqrt(8 / 3);
    const SURFACE_GAP = 0.008;
    const FACE_CUT = 0.105; // recorte visual de ~1/10 de la arista
    const SPECIAL_TETRA_FACE = 0;

    const octaColors = [0x29374e, 0x314463, 0x263e56, 0x3d315b, 0x203f3a, 0x4c362d, 0x323d55, 0x442f4d];
    const tetraColors = [0xff5478, 0xffd166, 0x49f0b4, 0x75a7ff];

    const baseOctaMaterial = {
      roughness: 0.58,
      metalness: 0.06,
      side: THREE.DoubleSide,
      transparent: false,
      opacity: 1
    };

    const currentMaterial = new THREE.MeshStandardMaterial({
      color: 0x49f0b4,
      emissive: 0x153e32,
      roughness: 0.38,
      metalness: 0.08,
      side: THREE.DoubleSide,
      transparent: false,
      opacity: 1
    });

    const neighborMaterial = new THREE.MeshStandardMaterial({
      color: 0x274c43,
      emissive: 0x10382f,
      roughness: 0.42,
      metalness: 0.06,
      side: THREE.DoubleSide,
      transparent: false,
      opacity: 1
    });

    function makeTextPlane(text, options = {}) {
      const { fontSize = 180, color = '#ffffff', stroke = 'rgba(0,0,0,0.75)', padding = 18, scale = 0.0030 } = options;
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      ctx.font = `950 ${fontSize}px system-ui, -apple-system, Segoe UI, sans-serif`;
      const metrics = ctx.measureText(text);
      canvas.width = Math.ceil(metrics.width + padding * 2);
      canvas.height = Math.ceil(fontSize + padding * 2);
      ctx.font = `950 ${fontSize}px system-ui, -apple-system, Segoe UI, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.lineWidth = Math.max(12, fontSize * 0.13);
      ctx.strokeStyle = stroke;
      ctx.strokeText(text, canvas.width / 2, canvas.height / 2 + 3);
      ctx.fillStyle = color;
      ctx.fillText(text, canvas.width / 2, canvas.height / 2 + 3);

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
      const material = new THREE.MeshBasicMaterial({
        map: texture,
        transparent: true,
        depthWrite: false,
        polygonOffset: true,
        polygonOffsetFactor: -4,
        side: THREE.DoubleSide
      });
      const geometry = new THREE.PlaneGeometry(canvas.width * scale, canvas.height * scale);
      return new THREE.Mesh(geometry, material);
    }

    function faceNormal(a, b, c) {
      return new THREE.Vector3().subVectors(b, a).cross(new THREE.Vector3().subVectors(c, a)).normalize();
    }

    function faceCenter(a, b, c) {
      return new THREE.Vector3().addVectors(a, b).add(c).multiplyScalar(1 / 3);
    }

    function getTruncatedFacePoints(a, b, c, cut = FACE_CUT) {
      const ab1 = a.clone().lerp(b, cut);
      const ab2 = b.clone().lerp(a, cut);
      const bc1 = b.clone().lerp(c, cut);
      const bc2 = c.clone().lerp(b, cut);
      const ca1 = c.clone().lerp(a, cut);
      const ca2 = a.clone().lerp(c, cut);
      return [ab1, ab2, bc1, bc2, ca1, ca2];
    }

    function makeTriangleMesh(a, b, c, material) {
      // Cara triangular con esquinas recortadas visualmente.
      // Importante: esto NO cambia los vértices matemáticos usados para rodar;
      // solo cambia el mesh visible. Así mantenemos la rodadura perfecta anterior.
      const pts = getTruncatedFacePoints(a, b, c);
      const center = faceCenter(a, b, c);

      const vertices = [];
      for (let i = 0; i < pts.length; i++) {
        const p1 = pts[i];
        const p2 = pts[(i + 1) % pts.length];
        vertices.push(
          center.x, center.y, center.z,
          p1.x, p1.y, p1.z,
          p2.x, p2.y, p2.z
        );
      }

      const geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vertices), 3));
      geom.computeVertexNormals();
      return new THREE.Mesh(geom, material);
    }

    function makeTruncatedEdgeLine(a, b, c, color = 0xffffff, opacity = 0.22) {
      const points = getTruncatedFacePoints(a, b, c);
      const geom = new THREE.BufferGeometry().setFromPoints(points);
      const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity });
      return new THREE.LineLoop(geom, mat);
    }

    function makeEdgeLine(points, color = 0xffffff, opacity = 0.22) {
      const geom = new THREE.BufferGeometry().setFromPoints(points);
      const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity });
      return new THREE.LineLoop(geom, mat);
    }

    function attachPlaneToTriangle(plane, a, b, c, normal, orientation = 0, offset = 0.018) {
      const center = faceCenter(a, b, c);
      const angle = orientation * (Math.PI * 2 / 3);
      const baseX = new THREE.Vector3().subVectors(b, a).normalize();
      const xAxis = baseX.clone().applyAxisAngle(normal, angle).normalize();
      const yAxis = new THREE.Vector3().crossVectors(normal, xAxis).normalize();
      const basis = new THREE.Matrix4().makeBasis(xAxis, yAxis, normal);
      plane.quaternion.setFromRotationMatrix(basis);
      plane.position.copy(center).addScaledVector(normal, offset);
    }

    const octaVertices = [
      new THREE.Vector3( OCTA_R, 0, 0),
      new THREE.Vector3(-OCTA_R, 0, 0),
      new THREE.Vector3(0,  OCTA_R, 0),
      new THREE.Vector3(0, -OCTA_R, 0),
      new THREE.Vector3(0, 0,  OCTA_R),
      new THREE.Vector3(0, 0, -OCTA_R)
    ];

    const octaFaceVertexIndices = [
      [0, 2, 4], [4, 2, 1], [1, 2, 5], [5, 2, 0],
      [4, 3, 0], [1, 3, 4], [5, 3, 1], [0, 3, 5]
    ];

    const octaFaces = [];
    let targetMarker = null;
    let tetraMarker = null;

    function buildOctahedronBoard() {
      boardGroup.clear();
      octaFaces.length = 0;

      octaFaceVertexIndices.forEach((rawIds, index) => {
        const ids = [...rawIds];
        let a = octaVertices[ids[0]].clone();
        let b = octaVertices[ids[1]].clone();
        let c = octaVertices[ids[2]].clone();
        let normal = faceNormal(a, b, c);
        let center = faceCenter(a, b, c);

        if (normal.dot(center) < 0) {
          [ids[1], ids[2]] = [ids[2], ids[1]];
          a = octaVertices[ids[0]].clone();
          b = octaVertices[ids[1]].clone();
          c = octaVertices[ids[2]].clone();
          normal = faceNormal(a, b, c);
          center = faceCenter(a, b, c);
        }

        const material = new THREE.MeshStandardMaterial({ ...baseOctaMaterial, color: octaColors[index] });
        const mesh = makeTriangleMesh(a, b, c, material);
        mesh.userData.type = 'octaFace';
        mesh.userData.faceIndex = index;
        boardGroup.add(mesh);
        boardGroup.add(makeTruncatedEdgeLine(a, b, c, 0xffffff, 0.18));
        octaFaces.push({ index, ids, vertices: [a, b, c], center, normal, mesh, material, neighbors: [] });
      });

      targetMarker = makeTextPlane('T', { color: '#ffe66d', stroke: 'rgba(0,0,0,0.82)', fontSize: 150, scale: 0.00235 });
      boardGroup.add(targetMarker);
    }

    function sharedVertices(faceA, faceB) {
      return faceA.ids.filter(id => faceB.ids.includes(id));
    }

    function computeNeighbors() {
      octaFaces.forEach(face => face.neighbors = []);
      for (let i = 0; i < octaFaces.length; i++) {
        for (let j = i + 1; j < octaFaces.length; j++) {
          const shared = sharedVertices(octaFaces[i], octaFaces[j]);
          if (shared.length === 2) {
            const edgePoints = shared.map(id => octaVertices[id].clone());
            octaFaces[i].neighbors.push({ faceIndex: j, edgeVertexIds: shared, edgePoints });
            octaFaces[j].neighbors.push({ faceIndex: i, edgeVertexIds: shared, edgePoints });
          }
        }
      }
    }

    buildOctahedronBoard();
    computeNeighbors();

    const rawTetraVertices = [
      new THREE.Vector3( 1,  1,  1),
      new THREE.Vector3(-1, -1,  1),
      new THREE.Vector3(-1,  1, -1),
      new THREE.Vector3( 1, -1, -1)
    ].map(v => v.normalize().multiplyScalar(TETRA_CIRCUMRADIUS));

    const tetraFaceVertexIndices = [
      [0, 2, 1],
      [0, 1, 3],
      [0, 3, 2],
      [1, 2, 3]
    ];

    const tetraFaces = [];

    function buildTetrahedron() {
      tetraGroup.clear();
      tetraFaces.length = 0;

      tetraFaceVertexIndices.forEach((rawIds, index) => {
        const ids = [...rawIds];
        let a = rawTetraVertices[ids[0]].clone();
        let b = rawTetraVertices[ids[1]].clone();
        let c = rawTetraVertices[ids[2]].clone();
        let normal = faceNormal(a, b, c);
        let center = faceCenter(a, b, c);

        if (normal.dot(center) < 0) {
          [ids[1], ids[2]] = [ids[2], ids[1]];
          a = rawTetraVertices[ids[0]].clone();
          b = rawTetraVertices[ids[1]].clone();
          c = rawTetraVertices[ids[2]].clone();
          normal = faceNormal(a, b, c);
          center = faceCenter(a, b, c);
        }

        const mat = new THREE.MeshStandardMaterial({
          color: tetraColors[index],
          roughness: 0.34,
          metalness: 0.08,
          side: THREE.DoubleSide
        });
        const mesh = makeTriangleMesh(a, b, c, mat);
        tetraGroup.add(mesh);
        const edge = makeTruncatedEdgeLine(a, b, c, 0x05070b, 0.55);
        tetraGroup.add(edge);
        tetraFaces.push({ index, ids, vertices: [a, b, c], center, normal, mesh, edge });
      });

      const special = tetraFaces[SPECIAL_TETRA_FACE];
      tetraMarker = makeTextPlane('T', { color: '#ffffff', stroke: 'rgba(0,0,0,0.86)', fontSize: 150, scale: 0.0022 });
      attachPlaneToTriangle(tetraMarker, special.vertices[0], special.vertices[1], special.vertices[2], special.normal, 0, 0.020);
      tetraGroup.add(tetraMarker);
    }

    buildTetrahedron();

    let currentOctaFaceIndex = 0;
    let currentTetraBottomFaceIndex = 0;
    let moves = 0;
    let score = 0;
    let isAnimating = false;
    let contactMap = new Map();
    let targetFaceIndex = 1;
    let targetOrientation = 0;

    function basisFromOrderedTriangle(points, desiredNormal) {
      const p0 = points[0].clone();
      const p1 = points[1].clone();
      const p2 = points[2].clone();
      const normal = faceNormal(p0, p1, p2);
      const x = new THREE.Vector3().subVectors(p1, p0).normalize();
      const y = new THREE.Vector3().crossVectors(normal, x).normalize();
      const center = faceCenter(p0, p1, p2);
      const matrix = new THREE.Matrix4().makeBasis(x, y, normal);
      return { center, normal, matrix };
    }

    function poseForMapping(octaFaceIndex, tetraBottomFaceIndex, map) {
      const octaFace = octaFaces[octaFaceIndex];
      const tetraFace = tetraFaces[tetraBottomFaceIndex];
      const sourceIds = tetraFace.ids;
      const sourcePoints = sourceIds.map(id => rawTetraVertices[id].clone());
      const targetPoints = sourceIds.map(tid => {
        const oid = map.get(tid);
        return octaVertices[oid].clone().addScaledVector(octaFace.normal, SURFACE_GAP);
      });
      const source = basisFromOrderedTriangle(sourcePoints, tetraFace.normal);
      const target = basisFromOrderedTriangle(targetPoints, octaFace.normal.clone().negate());
      const invSourceRot = source.matrix.clone().invert();
      const rotMatrix = target.matrix.clone().multiply(invSourceRot);
      const quat = new THREE.Quaternion().setFromRotationMatrix(rotMatrix);
      const sourceCenterRotated = source.center.clone().applyQuaternion(quat);
      const pos = target.center.clone().sub(sourceCenterRotated);
      return { pos, quat };
    }

    function makeContactMap(octaFaceIndex, tetraBottomFaceIndex, orientation = 0) {
      const octaFace = octaFaces[octaFaceIndex];
      const tetraFace = tetraFaces[tetraBottomFaceIndex];
      const tids = tetraFace.ids;
      const oids = octaFace.ids;
      const candidates = [
        [oids[0], oids[1], oids[2]], [oids[0], oids[2], oids[1]],
        [oids[1], oids[2], oids[0]], [oids[1], oids[0], oids[2]],
        [oids[2], oids[0], oids[1]], [oids[2], oids[1], oids[0]]
      ];
      let best = candidates[0];
      let bestDot = -Infinity;
      for (const cand of candidates) {
        const pts = cand.map(id => octaVertices[id].clone().addScaledVector(octaFace.normal, SURFACE_GAP));
        const n = faceNormal(pts[0], pts[1], pts[2]);
        const d = n.dot(octaFace.normal.clone().negate());
        if (d > bestDot) { bestDot = d; best = cand; }
      }
      const spin = ((orientation % 3) + 3) % 3;
      const spun = best.slice(spin).concat(best.slice(0, spin));
      const map = new Map();
      tids.forEach((tid, i) => map.set(tid, spun[i]));
      return map;
    }

    function getTetraFaceWorldNormal(faceIndex) {
      return tetraFaces[faceIndex].normal.clone().transformDirection(tetraGroup.matrixWorld).normalize();
    }

    function getTetraVertexWorld(vertexId) {
      return rawTetraVertices[vertexId].clone().applyMatrix4(tetraGroup.matrixWorld);
    }

    function updateTetraFaceVisibility({ hideBottom = true } = {}) {
      tetraFaces.forEach((face, i) => {
        const isBottom = hideBottom && i === currentTetraBottomFaceIndex;
        face.mesh.visible = !isBottom;
        face.edge.visible = !isBottom;
      });
      tetraMarker.visible = !(hideBottom && currentTetraBottomFaceIndex === SPECIAL_TETRA_FACE);
    }

    function applyTetraPose(octaFaceIndex, tetraBottomFaceIndex, map) {
      const pose = poseForMapping(octaFaceIndex, tetraBottomFaceIndex, map);
      tetraGroup.position.copy(pose.pos);
      tetraGroup.quaternion.copy(pose.quat);
      tetraGroup.updateMatrixWorld(true);
      updateTetraFaceVisibility();
    }

    function updateFaceMaterials() {
      // Sin iluminación de caras vecinas/actuales: el juego se lee solo por la T objetivo
      // y la T oculta del tetraedro.
      octaFaces.forEach(face => { face.mesh.material = face.material; });
    }

    function updateHUD() {
      scoreEl.textContent = String(score);
      movesEl.textContent = String(moves);
    }

    function isNeighbor(target) {
      return octaFaces[currentOctaFaceIndex].neighbors.some(n => n.faceIndex === target);
    }

    function getNeighborData(target) {
      return octaFaces[currentOctaFaceIndex].neighbors.find(n => n.faceIndex === target);
    }

    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function computeRollState(target) {
      const neighbor = getNeighborData(target);
      const currentBottom = tetraFaces[currentTetraBottomFaceIndex];
      const sharedOctaIds = neighbor.edgeVertexIds;
      const sharedTetraIds = currentBottom.ids.filter(tid => sharedOctaIds.includes(contactMap.get(tid)));
      if (sharedTetraIds.length !== 2) return null;
      const newBottomFace = tetraFaces.find(face => face.index !== currentTetraBottomFaceIndex && sharedTetraIds.every(tid => face.ids.includes(tid)));
      if (!newBottomFace) return null;
      const targetFace = octaFaces[target];
      const targetThirdOctaId = targetFace.ids.find(oid => !sharedOctaIds.includes(oid));
      const newThirdTetraId = newBottomFace.ids.find(tid => !sharedTetraIds.includes(tid));
      const newMap = new Map();
      sharedTetraIds.forEach(tid => newMap.set(tid, contactMap.get(tid)));
      newMap.set(newThirdTetraId, targetThirdOctaId);
      return { newBottomFaceIndex: newBottomFace.index, newMap, sharedTetraIds, neighbor };
    }

    function transformByAxis(point, quat, pivot) {
      return point.clone().sub(pivot).applyQuaternion(quat).add(pivot);
    }

    function signedAngleAroundAxis(fromVec, toVec, axis) {
      const a = axis.clone().normalize();
      const v1 = fromVec.clone().sub(a.clone().multiplyScalar(fromVec.dot(a))).normalize();
      const v2 = toVec.clone().sub(a.clone().multiplyScalar(toVec.dot(a))).normalize();
      const cross = new THREE.Vector3().crossVectors(v1, v2);
      const sin = cross.dot(a);
      const cos = THREE.MathUtils.clamp(v1.dot(v2), -1, 1);
      return Math.atan2(sin, cos);
    }

    function octaOutsideMargin(point) {
      return Math.abs(point.x) + Math.abs(point.y) + Math.abs(point.z) - OCTA_R;
    }

    function minTetraOutsideMarginForRotation(startPos, startQuat, axis, pivot, angle) {
      const q = new THREE.Quaternion().setFromAxisAngle(axis, angle);
      let minMargin = Infinity;
      for (const v of rawTetraVertices) {
        const world = v.clone().applyQuaternion(startQuat).add(startPos);
        const rotated = transformByAxis(world, q, pivot);
        minMargin = Math.min(minMargin, octaOutsideMargin(rotated));
      }
      return minMargin;
    }

    function chooseExteriorRollAngle(baseAngle, startPos, startQuat, axis, pivot) {
      const candidates = [baseAngle, baseAngle + Math.PI * 2, baseAngle - Math.PI * 2];
      let bestAngle = baseAngle;
      let bestScore = -Infinity;
      for (const candidate of candidates) {
        const score = Math.min(
          minTetraOutsideMarginForRotation(startPos, startQuat, axis, pivot, candidate * 0.25),
          minTetraOutsideMarginForRotation(startPos, startQuat, axis, pivot, candidate * 0.50),
          minTetraOutsideMarginForRotation(startPos, startQuat, axis, pivot, candidate * 0.75)
        ) - Math.abs(candidate) * 0.0001;
        if (score > bestScore) { bestScore = score; bestAngle = candidate; }
      }
      return bestAngle;
    }

    function tangentDirectionOfPlane(plane, faceNormal) {
      scene.updateMatrixWorld(true);
      const dir = new THREE.Vector3(0, 1, 0).transformDirection(plane.matrixWorld).normalize();
      const tangent = dir.sub(faceNormal.clone().multiplyScalar(dir.dot(faceNormal)));
      if (tangent.lengthSq() < 0.000001) return new THREE.Vector3(0, 0, 0);
      return tangent.normalize();
    }

    function checkMatch() {
      updateHUD();
      if (currentOctaFaceIndex !== targetFaceIndex) return;
      if (currentTetraBottomFaceIndex !== SPECIAL_TETRA_FACE) return;

      const faceNormal = octaFaces[currentOctaFaceIndex].normal.clone();
      const targetUp = tangentDirectionOfPlane(targetMarker, faceNormal);
      const tetraUp = tangentDirectionOfPlane(tetraMarker, faceNormal);

      const same = tetraUp.dot(targetUp);
      const opposite = tetraUp.dot(targetUp.clone().negate());

      // En algunos móviles/cámaras es difícil saber si la lectura correcta es face-to-face
      // o screen-facing. Para no depender de una convención errónea, mostramos ambos valores
      // y aceptamos el alineamiento visual fuerte en cualquiera de los dos sentidos.
      // Si quieres hacerlo más estricto luego, deja solo `opposite > 0.82`.
      const alignment = Math.max(same, opposite);
      console.log('Check T match', {
        targetFace: targetFaceIndex,
        targetOrientation,
        same: Number(same.toFixed(4)),
        opposite: Number(opposite.toFixed(4)),
        alignment: Number(alignment.toFixed(4)),
        rule: 'match si max(same, opposite) > 0.82'
      });

      if (alignment < 0.82) return;

      score += 1;
      flashTarget();
      updateHUD();
      spawnTarget();
    }

    function flashTarget() {
      targetMarker.scale.multiplyScalar(1.22);
      setTimeout(() => targetMarker.scale.multiplyScalar(1 / 1.22), 120);
    }

    function spawnTarget() {
      const available = octaFaces.map(f => f.index).filter(i => i !== currentOctaFaceIndex);
      targetFaceIndex = available[Math.floor(Math.random() * available.length)];
      targetOrientation = Math.floor(Math.random() * 3);
      const f = octaFaces[targetFaceIndex];
      attachPlaneToTriangle(targetMarker, f.vertices[0], f.vertices[1], f.vertices[2], f.normal, targetOrientation, 0.030);
      updateHUD();
    }

    function rollToFace(target) {
      if (isAnimating) return;
      if (!isNeighbor(target)) return;
      const rollState = computeRollState(target);
      if (!rollState) return;

      isAnimating = true;
      updateTetraFaceVisibility({ hideBottom: false });

      tetraGroup.updateMatrixWorld(true);
      const edgeWorldA = getTetraVertexWorld(rollState.sharedTetraIds[0]);
      const edgeWorldB = getTetraVertexWorld(rollState.sharedTetraIds[1]);
      const axis = new THREE.Vector3().subVectors(edgeWorldB, edgeWorldA).normalize();
      const pivot = edgeWorldA.clone();
      const startPos = tetraGroup.position.clone();
      const startQuat = tetraGroup.quaternion.clone();
      const newBottomNormalNow = getTetraFaceWorldNormal(rollState.newBottomFaceIndex);
      const requiredBottomNormal = octaFaces[target].normal.clone().negate();
      const baseAngle = signedAngleAroundAxis(newBottomNormalNow, requiredBottomNormal, axis);
      const angle = chooseExteriorRollAngle(baseAngle, startPos, startQuat, axis, pivot);
      const endPose = poseForMapping(target, rollState.newBottomFaceIndex, rollState.newMap);
      const duration = 720;
      const startTime = performance.now();

      function animateRoll(now) {
        const rawT = Math.min(1, (now - startTime) / duration);
        const t = easeInOutCubic(rawT);
        const q = new THREE.Quaternion().setFromAxisAngle(axis, angle * t);
        tetraGroup.position.copy(transformByAxis(startPos, q, pivot));
        tetraGroup.quaternion.copy(q.clone().multiply(startQuat));
        tetraGroup.updateMatrixWorld(true);
        if (rawT < 1) {
          requestAnimationFrame(animateRoll);
        } else {
          currentOctaFaceIndex = target;
          currentTetraBottomFaceIndex = rollState.newBottomFaceIndex;
          contactMap = rollState.newMap;
          tetraGroup.position.copy(endPose.pos);
          tetraGroup.quaternion.copy(endPose.quat);
          tetraGroup.updateMatrixWorld(true);
          updateTetraFaceVisibility();
          moves += 1;
          updateFaceMaterials();
          updateHUD();
          isAnimating = false;
          checkMatch();
        }
      }
      requestAnimationFrame(animateRoll);
    }

    let pointerStart = null;
    const TAP_MAX_DISTANCE = 8;
    const TAP_MAX_TIME = 450;

    function onPointerDown(event) {
      pointerStart = { x: event.clientX, y: event.clientY, time: performance.now() };
    }

    function onPointerUp(event) {
      if (isAnimating || !pointerStart) return;
      const dx = event.clientX - pointerStart.x;
      const dy = event.clientY - pointerStart.y;
      const dist = Math.hypot(dx, dy);
      const dt = performance.now() - pointerStart.time;
      const wasTap = dist <= TAP_MAX_DISTANCE && dt <= TAP_MAX_TIME;
      pointerStart = null;
      if (!wasTap) return;
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(octaFaces.map(f => f.mesh), false);
      if (!hits.length) return;
      const faceIndex = hits[0].object.userData.faceIndex;
      if (faceIndex === currentOctaFaceIndex) return;
      if (!isNeighbor(faceIndex)) return;
      rollToFace(faceIndex);
    }

    function resetGame() {
      currentOctaFaceIndex = 0;
      currentTetraBottomFaceIndex = SPECIAL_TETRA_FACE;
      moves = 0;
      score = 0;
      isAnimating = false;
      contactMap = makeContactMap(currentOctaFaceIndex, currentTetraBottomFaceIndex, 0);
      applyTetraPose(currentOctaFaceIndex, currentTetraBottomFaceIndex, contactMap);
      spawnTarget();
      updateFaceMaterials();
      updateHUD();
    }

    renderer.domElement.addEventListener('pointerdown', onPointerDown, { passive: true });
    renderer.domElement.addEventListener('pointerup', onPointerUp, { passive: true });
    resetBtn.addEventListener('click', resetGame);

    function addAtmosphere() {
      const starGeom = new THREE.BufferGeometry();
      const positions = [];
      for (let i = 0; i < 260; i++) {
        const r = 8 + Math.random() * 10;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(THREE.MathUtils.randFloatSpread(2));
        positions.push(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
      }
      starGeom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.015, transparent: true, opacity: 0.5 });
      scene.add(new THREE.Points(starGeom, starMat));
    }

    addAtmosphere();
    resetGame();

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      controls.handleResize();
    }
    window.addEventListener('resize', onResize);

    function animate() {
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>

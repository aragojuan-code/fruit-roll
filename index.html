<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tetra sobre Octaedro — prototipo</title>
  <style>
    :root {
      --bg: #070a10;
      --panel: rgba(12, 16, 26, 0.72);
      --panel-border: rgba(255,255,255,0.12);
      --text: #eef5ff;
      --muted: #9aa8bb;
      --green: #49f0b4;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at 50% 25%, #17233a 0%, var(--bg) 48%, #02030a 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
    }

    #app { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; }

    .hud {
      position: fixed;
      top: max(14px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      width: min(760px, calc(100vw - 28px));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--panel-border);
      background: var(--panel);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.35);
      z-index: 5;
    }

    .title { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .title strong { font-size: 15px; letter-spacing: 0.02em; white-space: nowrap; }
    .title span { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stats { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .pill { padding: 7px 9px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 999px; font-size: 12px; color: var(--muted); white-space: nowrap; }
    .pill b { color: var(--text); }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 8px 12px;
      color: #06110e;
      background: linear-gradient(135deg, #40e7b1, #a7ffe9);
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(73,240,180,0.18);
    }
    button:active { transform: translateY(1px); }

    .hint {
      position: fixed;
      bottom: max(14px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      width: min(680px, calc(100vw - 28px));
      padding: 10px 12px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(8, 12, 20, 0.56);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      z-index: 5;
      pointer-events: none;
    }

    @media (max-width: 620px) {
      .hud { align-items: flex-start; }
      .stats { gap: 6px; }
      .pill { padding: 6px 8px; font-size: 11px; }
      .title strong { font-size: 14px; }
      .title span { display: none; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div class="hud">
    <div class="title">
      <strong>Tetra sobre Octaedro</strong>
      <span>Click/tap en una cara vecina para rodar</span>
    </div>
    <div class="stats">
      <div class="pill">Octa: <b id="octaFace">O1</b></div>
      <div class="pill">Tetra abajo: <b id="tetraFace">T1</b></div>
      <div class="pill">Spin: <b id="spinFace">0</b></div>
      <div class="pill">Movs: <b id="moves">0</b></div>
      <button id="resetBtn">Reset</button>
    </div>
  </div>

  <div class="hint">
    El tetraedro está apoyado por fuera: la cara inferior se oculta. Pulsa solo caras verdes vecinas. Rueda visual por ahora; el estado final encaja triángulo contra triángulo.
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const octaFaceEl = document.getElementById('octaFace');
    const tetraFaceEl = document.getElementById('tetraFace');
    const spinFaceEl = document.getElementById('spinFace');
    const movesEl = document.getElementById('moves');
    const resetBtn = document.getElementById('resetBtn');

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x070a10, 8, 18);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(4.4, 3.2, 5.2);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 0, 0);
    controls.minDistance = 3.6;
    controls.maxDistance = 10;
    controls.enablePan = false;

    scene.add(new THREE.HemisphereLight(0x99bbff, 0x111018, 1.8));
    const keyLight = new THREE.DirectionalLight(0xffffff, 2.4);
    keyLight.position.set(4, 5, 4);
    scene.add(keyLight);
    const rimLight = new THREE.PointLight(0x49f0b4, 5, 10);
    rimLight.position.set(-3, 2, 3);
    scene.add(rimLight);

    const boardGroup = new THREE.Group();
    const tetraGroup = new THREE.Group();
    scene.add(boardGroup);
    scene.add(tetraGroup);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    const OCTA_R = 2.15;
    const OCTA_EDGE = OCTA_R * Math.sqrt(2);
    const TETRA_CIRCUMRADIUS = OCTA_EDGE / Math.sqrt(8 / 3); // tetra edge == octa face edge
    const SURFACE_GAP = 0.012;

    const octaColors = [0x29374e, 0x314463, 0x263e56, 0x3d315b, 0x203f3a, 0x4c362d, 0x323d55, 0x442f4d];
    const tetraColors = [0xff5478, 0xffd166, 0x49f0b4, 0x75a7ff];

    const baseOctaMaterial = {
      roughness: 0.58,
      metalness: 0.06,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.96
    };

    const currentMaterial = new THREE.MeshStandardMaterial({
      color: 0x49f0b4,
      emissive: 0x153e32,
      roughness: 0.38,
      metalness: 0.08,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.98
    });

    const neighborMaterial = new THREE.MeshStandardMaterial({
      color: 0x274c43,
      emissive: 0x10382f,
      roughness: 0.42,
      metalness: 0.06,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.95
    });

    function makeTextSprite(text, options = {}) {
      const { fontSize = 72, color = '#ffffff', padding = 22, scale = 0.28 } = options;
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      ctx.font = `800 ${fontSize}px system-ui, -apple-system, Segoe UI, sans-serif`;
      const metrics = ctx.measureText(text);
      canvas.width = Math.ceil(metrics.width + padding * 2);
      canvas.height = Math.ceil(fontSize + padding * 2);
      ctx.font = `800 ${fontSize}px system-ui, -apple-system, Segoe UI, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.lineWidth = 8;
      ctx.strokeStyle = 'rgba(0,0,0,0.55)';
      ctx.strokeText(text, canvas.width / 2, canvas.height / 2 + 1);
      ctx.fillStyle = color;
      ctx.fillText(text, canvas.width / 2, canvas.height / 2 + 1);
      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      const material = new THREE.SpriteMaterial({ map: texture, transparent: true, depthWrite: false });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set((canvas.width / canvas.height) * scale, scale, 1);
      return sprite;
    }

    function faceNormal(a, b, c) {
      return new THREE.Vector3().subVectors(b, a).cross(new THREE.Vector3().subVectors(c, a)).normalize();
    }

    function faceCenter(a, b, c) {
      return new THREE.Vector3().addVectors(a, b).add(c).multiplyScalar(1 / 3);
    }

    function makeTriangleMesh(a, b, c, material) {
      const geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
        a.x, a.y, a.z,
        b.x, b.y, b.z,
        c.x, c.y, c.z
      ]), 3));
      geom.setIndex([0, 1, 2]);
      geom.computeVertexNormals();
      return new THREE.Mesh(geom, material);
    }

    function makeEdgeLine(points, color = 0xffffff, opacity = 0.22) {
      const geom = new THREE.BufferGeometry().setFromPoints(points);
      const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity });
      return new THREE.LineLoop(geom, mat);
    }

    const octaVertices = [
      new THREE.Vector3( OCTA_R, 0, 0),
      new THREE.Vector3(-OCTA_R, 0, 0),
      new THREE.Vector3(0,  OCTA_R, 0),
      new THREE.Vector3(0, -OCTA_R, 0),
      new THREE.Vector3(0, 0,  OCTA_R),
      new THREE.Vector3(0, 0, -OCTA_R)
    ];

    const octaFaceVertexIndices = [
      [0, 2, 4], [4, 2, 1], [1, 2, 5], [5, 2, 0],
      [4, 3, 0], [1, 3, 4], [5, 3, 1], [0, 3, 5]
    ];

    const octaFaces = [];

    function buildOctahedronBoard() {
      boardGroup.clear();
      octaFaces.length = 0;

      octaFaceVertexIndices.forEach((rawIds, index) => {
        const ids = [...rawIds];
        let a = octaVertices[ids[0]].clone();
        let b = octaVertices[ids[1]].clone();
        let c = octaVertices[ids[2]].clone();
        let normal = faceNormal(a, b, c);
        let center = faceCenter(a, b, c);

        if (normal.dot(center) < 0) {
          [ids[1], ids[2]] = [ids[2], ids[1]];
          a = octaVertices[ids[0]].clone();
          b = octaVertices[ids[1]].clone();
          c = octaVertices[ids[2]].clone();
          normal = faceNormal(a, b, c);
          center = faceCenter(a, b, c);
        }

        const material = new THREE.MeshStandardMaterial({ ...baseOctaMaterial, color: octaColors[index] });
        const mesh = makeTriangleMesh(a, b, c, material);
        mesh.userData.type = 'octaFace';
        mesh.userData.faceIndex = index;
        boardGroup.add(mesh);
        boardGroup.add(makeEdgeLine([a, b, c], 0xffffff, 0.18));

        const label = makeTextSprite(`O${index + 1}`, { color: '#eef5ff', fontSize: 74, scale: 0.33 });
        label.position.copy(center).addScaledVector(normal, 0.035);
        boardGroup.add(label);

        octaFaces.push({ index, ids, vertices: [a, b, c], center, normal, mesh, material, label, neighbors: [] });
      });
    }

    function sharedVertices(faceA, faceB) {
      return faceA.ids.filter(id => faceB.ids.includes(id));
    }

    function computeNeighbors() {
      octaFaces.forEach(face => face.neighbors = []);
      for (let i = 0; i < octaFaces.length; i++) {
        for (let j = i + 1; j < octaFaces.length; j++) {
          const shared = sharedVertices(octaFaces[i], octaFaces[j]);
          if (shared.length === 2) {
            const edgePoints = shared.map(id => octaVertices[id].clone());
            octaFaces[i].neighbors.push({ faceIndex: j, edgeVertexIds: shared, edgePoints });
            octaFaces[j].neighbors.push({ faceIndex: i, edgeVertexIds: shared, edgePoints });
          }
        }
      }
    }

    buildOctahedronBoard();
    computeNeighbors();

    const rawTetraVertices = [
      new THREE.Vector3( 1,  1,  1),
      new THREE.Vector3(-1, -1,  1),
      new THREE.Vector3(-1,  1, -1),
      new THREE.Vector3( 1, -1, -1)
    ].map(v => v.normalize().multiplyScalar(TETRA_CIRCUMRADIUS));

    const tetraFaceVertexIndices = [
      [0, 2, 1],
      [0, 1, 3],
      [0, 3, 2],
      [1, 2, 3]
    ];

    const tetraFaces = [];

    function buildTetrahedron() {
      tetraGroup.clear();
      tetraFaces.length = 0;

      tetraFaceVertexIndices.forEach((rawIds, index) => {
        const ids = [...rawIds];
        let a = rawTetraVertices[ids[0]].clone();
        let b = rawTetraVertices[ids[1]].clone();
        let c = rawTetraVertices[ids[2]].clone();
        let normal = faceNormal(a, b, c);
        let center = faceCenter(a, b, c);

        if (normal.dot(center) < 0) {
          [ids[1], ids[2]] = [ids[2], ids[1]];
          a = rawTetraVertices[ids[0]].clone();
          b = rawTetraVertices[ids[1]].clone();
          c = rawTetraVertices[ids[2]].clone();
          normal = faceNormal(a, b, c);
          center = faceCenter(a, b, c);
        }

        const mat = new THREE.MeshStandardMaterial({
          color: tetraColors[index],
          roughness: 0.34,
          metalness: 0.08,
          side: THREE.FrontSide // CLAVE: la cara apoyada no debe verse como una losa encima del octaedro.
        });
        const mesh = makeTriangleMesh(a, b, c, mat);
        tetraGroup.add(mesh);
        tetraGroup.add(makeEdgeLine([a, b, c], 0x05070b, 0.55));

        const label = makeTextSprite(`T${index + 1}`, {
          color: index === 1 ? '#1a1200' : '#06100e',
          fontSize: 68,
          scale: 0.22
        });
        label.position.copy(center).addScaledVector(normal, 0.026);
        tetraGroup.add(label);

        tetraFaces.push({ index, ids, vertices: [a, b, c], center, normal, mesh, label });
      });
    }

    buildTetrahedron();

    let currentOctaFaceIndex = 0;
    let currentTetraBottomFaceIndex = 0;
    let currentSpin = 0;
    let moves = 0;
    let isAnimating = false;

    function basisFromTriangle(a, b, c, desiredNormal = null) {
      let p0 = a.clone();
      let p1 = b.clone();
      let p2 = c.clone();
      let normal = faceNormal(p0, p1, p2);
      if (desiredNormal && normal.dot(desiredNormal) < 0) {
        const tmp = p1; p1 = p2; p2 = tmp;
        normal = faceNormal(p0, p1, p2);
      }
      const x = new THREE.Vector3().subVectors(p1, p0).normalize();
      const y = new THREE.Vector3().crossVectors(normal, x).normalize();
      const center = faceCenter(p0, p1, p2);
      const matrix = new THREE.Matrix4().makeBasis(x, y, normal);
      return { p0, p1, p2, center, normal, matrix };
    }

    function poseFor(octaFaceIndex, tetraBottomFaceIndex, spin = 0) {
      const octaFace = octaFaces[octaFaceIndex];
      const tetraFace = tetraFaces[tetraBottomFaceIndex];

      const sourceVerts = tetraFace.ids.map(id => rawTetraVertices[id].clone());
      const source = basisFromTriangle(sourceVerts[0], sourceVerts[1], sourceVerts[2], tetraFace.normal);

      // Three valid orientation spins: rotate the target triangle mapping by 0/1/2 vertices.
      const targetIdsBase = [...octaFace.ids];
      const spinSteps = ((spin % 3) + 3) % 3;
      const targetIds = targetIdsBase.slice(spinSteps).concat(targetIdsBase.slice(0, spinSteps));
      const targetVerts = targetIds.map(id => octaVertices[id].clone().addScaledVector(octaFace.normal, SURFACE_GAP));

      // Bottom face exterior normal must point into the octahedron surface, i.e. -octaNormal.
      const target = basisFromTriangle(targetVerts[0], targetVerts[1], targetVerts[2], octaFace.normal.clone().negate());

      const invSourceRot = source.matrix.clone().invert();
      const rotMatrix = target.matrix.clone().multiply(invSourceRot);
      const quat = new THREE.Quaternion().setFromRotationMatrix(rotMatrix);
      const sourceCenterRotated = source.center.clone().applyQuaternion(quat);
      const pos = target.center.clone().sub(sourceCenterRotated);

      return { pos, quat };
    }

    function applyTetraPose(octaFaceIndex, tetraBottomFaceIndex, spin = 0) {
      const pose = poseFor(octaFaceIndex, tetraBottomFaceIndex, spin);
      tetraGroup.position.copy(pose.pos);
      tetraGroup.quaternion.copy(pose.quat);
      tetraGroup.updateMatrixWorld(true);
      updateTetraFaceVisibility();
      validateContact(octaFaceIndex, tetraBottomFaceIndex);
    }

    function getTetraFaceWorldNormal(faceIndex) {
      return tetraFaces[faceIndex].normal.clone().transformDirection(tetraGroup.matrixWorld).normalize();
    }

    function getTetraFaceWorldCenter(faceIndex) {
      return tetraFaces[faceIndex].center.clone().applyMatrix4(tetraGroup.matrixWorld);
    }

    function updateTetraFaceVisibility() {
      tetraFaces.forEach((face, i) => {
        const isBottom = i === currentTetraBottomFaceIndex;
        face.mesh.visible = !isBottom;
        face.label.visible = !isBottom;
      });
    }

    function validateContact(octaFaceIndex, tetraBottomFaceIndex) {
      const octaNormal = octaFaces[octaFaceIndex].normal.clone();
      const tetraBottomNormal = getTetraFaceWorldNormal(tetraBottomFaceIndex);
      const dot = tetraBottomNormal.dot(octaNormal.clone().negate());
      console.log('Contacto', {
        octa: `O${octaFaceIndex + 1}`,
        tetraBottom: `T${tetraBottomFaceIndex + 1}`,
        spin: currentSpin,
        dot: Number(dot.toFixed(6)),
        expected: 'dot cercano a 1; tetra por fuera; cara apoyada oculta'
      });
    }

    function updateFaceMaterials() {
      octaFaces.forEach(face => { face.mesh.material = face.material; });
      octaFaces[currentOctaFaceIndex].mesh.material = currentMaterial;
      for (const n of octaFaces[currentOctaFaceIndex].neighbors) {
        octaFaces[n.faceIndex].mesh.material = neighborMaterial;
      }
    }

    function updateHUD() {
      octaFaceEl.textContent = `O${currentOctaFaceIndex + 1}`;
      tetraFaceEl.textContent = `T${currentTetraBottomFaceIndex + 1}`;
      spinFaceEl.textContent = String(currentSpin);
      movesEl.textContent = String(moves);
    }

    function isNeighbor(targetFaceIndex) {
      return octaFaces[currentOctaFaceIndex].neighbors.some(n => n.faceIndex === targetFaceIndex);
    }

    function getNeighborData(targetFaceIndex) {
      return octaFaces[currentOctaFaceIndex].neighbors.find(n => n.faceIndex === targetFaceIndex);
    }

    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function chooseNextBottomFace(currentBottomFaceIndex, sharedOctaVertexIds) {
      // Provisional but coherent: the next bottom face must be one of the 3 faces adjacent to the current bottom face.
      // A later version should track exact vertex-to-vertex correspondence for physically exact rolling.
      const currentIds = tetraFaces[currentBottomFaceIndex].ids;
      const adjacent = tetraFaces.filter(f => f.index !== currentBottomFaceIndex && f.ids.filter(id => currentIds.includes(id)).length === 2);
      const pick = adjacent[moves % adjacent.length];
      return pick.index;
    }

    function rollToFace(targetFaceIndex) {
      if (isAnimating) return;
      const neighbor = getNeighborData(targetFaceIndex);
      if (!neighbor) {
        console.log('Movimiento inválido', { current: `O${currentOctaFaceIndex + 1}`, target: `O${targetFaceIndex + 1}` });
        return;
      }

      isAnimating = true;

      const startPos = tetraGroup.position.clone();
      const startQuat = tetraGroup.quaternion.clone();
      const startFace = currentOctaFaceIndex;
      const nextBottom = chooseNextBottomFace(currentTetraBottomFaceIndex, neighbor.edgeVertexIds);
      const nextSpin = (currentSpin + 1) % 3;
      const endPose = poseFor(targetFaceIndex, nextBottom, nextSpin);
      const fromNormal = octaFaces[startFace].normal.clone();
      const toNormal = octaFaces[targetFaceIndex].normal.clone();

      const duration = 520;
      const startTime = performance.now();

      console.log('Rodando visualmente', {
        from: `O${startFace + 1}`,
        to: `O${targetFaceIndex + 1}`,
        oldBottom: `T${currentTetraBottomFaceIndex + 1}`,
        newBottom: `T${nextBottom + 1}`,
        sharedEdge: neighbor.edgeVertexIds
      });

      function animateRoll(now) {
        const rawT = Math.min(1, (now - startTime) / duration);
        const t = easeInOutCubic(rawT);
        tetraGroup.position.lerpVectors(startPos, endPose.pos, t);
        tetraGroup.quaternion.slerpQuaternions(startQuat, endPose.quat, t);
        const lift = Math.sin(Math.PI * t) * 0.18;
        const blendedNormal = fromNormal.clone().lerp(toNormal, t).normalize();
        tetraGroup.position.addScaledVector(blendedNormal, lift);
        tetraGroup.updateMatrixWorld(true);

        if (rawT < 1) {
          requestAnimationFrame(animateRoll);
        } else {
          currentOctaFaceIndex = targetFaceIndex;
          currentTetraBottomFaceIndex = nextBottom;
          currentSpin = nextSpin;
          applyTetraPose(currentOctaFaceIndex, currentTetraBottomFaceIndex, currentSpin);
          moves += 1;
          updateFaceMaterials();
          updateHUD();
          isAnimating = false;
        }
      }

      requestAnimationFrame(animateRoll);
    }

    function onPointerDown(event) {
      if (isAnimating) return;
      const rect = renderer.domElement.getBoundingClientRect();
      const x = event.clientX;
      const y = event.clientY;
      pointer.x = ((x - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((y - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(octaFaces.map(f => f.mesh), false);
      if (!hits.length) return;
      const faceIndex = hits[0].object.userData.faceIndex;
      if (faceIndex === currentOctaFaceIndex) return;
      if (!isNeighbor(faceIndex)) {
        console.log('Movimiento inválido: cara no vecina', { current: `O${currentOctaFaceIndex + 1}`, clicked: `O${faceIndex + 1}` });
        return;
      }
      rollToFace(faceIndex);
    }

    function resetGame() {
      currentOctaFaceIndex = 0;
      currentTetraBottomFaceIndex = 0;
      currentSpin = 0;
      moves = 0;
      isAnimating = false;
      console.clear();
      applyTetraPose(currentOctaFaceIndex, currentTetraBottomFaceIndex, currentSpin);
      updateFaceMaterials();
      updateHUD();
      console.log('Reset completo');
    }

    renderer.domElement.addEventListener('pointerdown', onPointerDown, { passive: true });
    resetBtn.addEventListener('click', resetGame);

    function addAtmosphere() {
      const starGeom = new THREE.BufferGeometry();
      const positions = [];
      for (let i = 0; i < 360; i++) {
        const r = 10 + Math.random() * 10;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(THREE.MathUtils.randFloatSpread(2));
        positions.push(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
      }
      starGeom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.018, transparent: true, opacity: 0.52 });
      scene.add(new THREE.Points(starGeom, starMat));
    }

    addAtmosphere();
    resetGame();

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    }
    window.addEventListener('resize', onResize);

    function animate() {
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
